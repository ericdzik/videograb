<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VideoGrab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fe2c55, #25f4ee, #1877f2);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 36px; }

    .platforms { display: flex; gap: 10px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }

    .platform-badge {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .tiktok   { background: #fe2c5520; color: #fe2c55; border: 1px solid #fe2c5540; }
    .snap     { background: #fffc0020; color: #fffc00; border: 1px solid #fffc0040; }
    .facebook { background: #1877f220; color: #1877f2; border: 1px solid #1877f240; }
    .youtube  { background: #ff000020; color: #ff4444; border: 1px solid #ff000040; }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 600px;
    }

    .input-row { display: flex; gap: 10px; }

    input[type="text"] {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      min-width: 0;
    }

    input[type="text"]:focus { border-color: #6c63ff; }
    input[type="text"]::placeholder { color: #555; }

    button {
      background: linear-gradient(135deg, #6c63ff, #4ecdc4);
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .loader { display: none; text-align: center; padding: 24px 0; color: #888; font-size: 0.9rem; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2a2a4a;
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    .progress-bar-wrap {
      background: #2a2a4a;
      border-radius: 6px;
      height: 6px;
      margin: 10px 0 6px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #6c63ff, #4ecdc4);
      border-radius: 6px;
      width: 0%;
      transition: width 0.4s ease;
      animation: indeterminate 1.5s infinite;
    }

    @keyframes indeterminate {
      0%   { margin-left: -30%; width: 30%; }
      100% { margin-left: 100%; width: 30%; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .preview { display: none; margin-top: 24px; }

    .preview-inner { display: flex; gap: 16px; align-items: flex-start; }

    .thumb {
      width: 110px; height: 75px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: #0f0f1a;
    }

    .thumb-placeholder {
      width: 110px; height: 75px;
      border-radius: 8px;
      background: #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .meta { flex: 1; min-width: 0; }
    .meta h3 { font-size: 0.9rem; margin-bottom: 4px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta .info { font-size: 0.75rem; color: #888; margin-bottom: 12px; }

    .format-select {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 0.85rem;
      width: 100%;
      margin-bottom: 12px;
      outline: none;
    }

    .btn-download {
      background: linear-gradient(135deg, #fe2c55, #ff6b35);
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .btn-save {
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 10px;
      display: block;
    }

    .btn-direct {
      background: #2a2a4a;
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-size: 0.85rem;
      color: #aaa;
      text-decoration: none;
      display: block;
      text-align: center;
      font-weight: 600;
    }

    .error {
      display: none;
      background: #ff4d4d15;
      border: 1px solid #ff4d4d40;
      border-radius: 10px;
      padding: 12px 16px;
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 16px;
    }

    .success {
      display: none;
      background: #4ecdc415;
      border: 1px solid #4ecdc440;
      border-radius: 10px;
      padding: 16px;
      color: #4ecdc4;
      font-size: 0.85rem;
      margin-top: 16px;
    }

    .footer { margin-top: 40px; color: #444; font-size: 0.78rem; text-align: center; }

    /* Mobile hint */
    .mobile-hint {
      font-size: 0.75rem;
      color: #666;
      margin-top: 8px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div class="logo">⬇ VideoGrab</div>
  <p class="subtitle">Télécharge des vidéos depuis tes plateformes préférées</p>

  <div class="platforms">
    <span class="platform-badge tiktok">TikTok</span>
    <span class="platform-badge snap">Snapchat</span>
    <span class="platform-badge facebook">Facebook</span>
  </div>

  <div class="card">
    <div class="input-row">
      <input type="text" id="urlInput" placeholder="Colle le lien de la vidéo ici..." autocomplete="off" autocorrect="off" />
      <button id="fetchBtn" onclick="fetchInfo()">Analyser</button>
    </div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <span id="loaderText">Analyse en cours...</span>
    </div>

    <div class="error" id="errorBox"></div>

    <div class="preview" id="preview">
      <div class="preview-inner">
        <div id="thumbContainer"></div>
        <div class="meta">
          <h3 id="videoTitle"></h3>
          <p class="info" id="videoInfo"></p>
          <select class="format-select" id="formatSelect"></select>
          <button class="btn-download" id="dlBtn" onclick="startDownload()">⬇ Télécharger</button>
        </div>
      </div>
    </div>

    <div class="success" id="successBox"></div>
  </div>

  <p class="footer">Usage personnel uniquement · Respecte les CGU des plateformes</p>

  <script>
    let currentUrl = '';
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    function showLoader(text) {
      document.getElementById('loader').style.display = 'block';
      document.getElementById('loaderText').textContent = text;
      document.getElementById('preview').style.display = 'none';
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('successBox').style.display = 'none';
    }

    function hideLoader() {
      document.getElementById('loader').style.display = 'none';
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = '⚠ ' + msg;
      box.style.display = 'block';
    }

    function formatDuration(secs) {
      if (!secs) return '';
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    async function fetchInfo() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;
      currentUrl = url;

      document.getElementById('fetchBtn').disabled = true;
      showLoader('Analyse en cours...');

      try {
        const res = await fetch('/api/info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const json = await res.json();
        if (!res.ok) throw new Error(json.detail || 'Erreur inconnue');

        const d = json.data;
        hideLoader();

        const thumbContainer = document.getElementById('thumbContainer');
        if (d.thumbnail) {
          thumbContainer.innerHTML = `<img class="thumb" src="${d.thumbnail}" onerror="this.parentElement.innerHTML='<div class=thumb-placeholder>🎬</div>'" />`;
        } else {
          thumbContainer.innerHTML = `<div class="thumb-placeholder">🎬</div>`;
        }

        document.getElementById('videoTitle').textContent = d.title;
        const dur = formatDuration(d.duration);
        document.getElementById('videoInfo').textContent =
          [d.platform, d.uploader, dur].filter(Boolean).join(' · ');

        const sel = document.getElementById('formatSelect');
        sel.innerHTML = '<option value="best">Meilleure qualité (auto)</option>';
        d.formats.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f.format_id;
          opt.textContent = `${f.label} (.${f.ext})`;
          sel.appendChild(opt);
        });

        document.getElementById('preview').style.display = 'block';
      } catch (e) {
        hideLoader();
        showError(e.message);
      } finally {
        document.getElementById('fetchBtn').disabled = false;
      }
    }

    async function startDownload() {
      const format_id = document.getElementById('formatSelect').value;
      document.getElementById('dlBtn').disabled = true;
      showLoader('Démarrage du téléchargement...');
      document.getElementById('preview').style.display = 'none';

      try {
        // 1. Lance le job en arrière-plan
        const startRes = await fetch('/api/download/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: currentUrl, format_id })
        });
        const startJson = await startRes.json();
        if (!startRes.ok) throw new Error(startJson.detail || 'Erreur inconnue');

        const jobId = startJson.job_id;

        // 2. Polling toutes les 2 secondes
        let dots = 0;
        const messages = [
          'Téléchargement en cours',
          'Traitement de la vidéo',
          'Presque prêt',
        ];
        const result = await new Promise((resolve, reject) => {
          const interval = setInterval(async () => {
            try {
              dots = (dots + 1) % 3;
              document.getElementById('loaderText').textContent =
                messages[dots] + '...';

              const statusRes = await fetch(`/api/download/status/${jobId}`);
              const status = await statusRes.json();

              if (status.status === 'done') {
                clearInterval(interval);
                resolve(status);
              } else if (status.status === 'error') {
                clearInterval(interval);
                reject(new Error(status.error));
              }
            } catch (e) {
              clearInterval(interval);
              reject(e);
            }
          }, 2000);
        });

        hideLoader();
        document.getElementById('preview').style.display = 'block';

        const fileUrl = `/api/file/${encodeURIComponent(result.filename)}`;
        showSuccessButtons(fileUrl, result.filename, result.title);

      } catch (e) {
        hideLoader();
        document.getElementById('preview').style.display = 'block';
        showError(e.message);
      } finally {
        document.getElementById('dlBtn').disabled = false;
      }
    }

    function showSuccessButtons(fileUrl, filename, title) {
      const box = document.getElementById('successBox');

      let html = `<div style="margin-bottom:12px;font-weight:600">✅ ${title || 'Vidéo'} est prête !</div>`;

      if (isMobile && navigator.share) {
        html += `<button class="btn-save" id="shareBtn">📤 Partager / Enregistrer dans la galerie</button>`;
      }

      html += `<a class="btn-direct" href="${fileUrl}" download="${filename}">⬇ Télécharger la vidéo</a>`;

      if (isIOS) {
        html += `<p style="font-size:0.72rem;color:#666;margin-top:8px;text-align:center">
          Sur iPhone : appuie sur "Télécharger la vidéo" → puis icône de partage → "Enregistrer la vidéo"
        </p>`;
      }

      html += `<p id="countdown" style="font-size:0.72rem;color:#666;margin-top:10px;text-align:center">
        🕐 Fichier disponible pendant <span id="timer">10:00</span>
      </p>`;

      box.innerHTML = html;
      box.style.display = 'block';

      // Compte à rebours 10 minutes
      let seconds = 600;
      const timerEl = document.getElementById('timer');
      const countdownInterval = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(countdownInterval);
          timerEl.parentElement.textContent = '⚠ Fichier expiré — relance le téléchargement';
          timerEl.parentElement.style.color = '#ff6b6b';
          return;
        }
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        timerEl.textContent = `${m}:${s.toString().padStart(2, '0')}`;
      }, 1000);

      const shareBtn = document.getElementById('shareBtn');
      if (shareBtn) {
        shareBtn.addEventListener('click', () => shareFile(fileUrl, filename));
      }
    }

    async function shareFile(url, filename) {
      const btn = document.getElementById('shareBtn');
      if (!btn || btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '⏳ Chargement...';

      try {
        const res = await fetch(url);
        const blob = await res.blob();
        const file = new File([blob], filename, { type: 'video/mp4' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: filename });
        } else {
          // Fallback : lien direct
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
        }
      } catch (e) {
        if (e.name !== 'AbortError') showError('Erreur : ' + e.message);
      } finally {
        if (btn) {
          btn.textContent = '📤 Partager / Enregistrer dans la galerie';
          btn.disabled = false;
        }
      }
    }

    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchInfo();
    });
  </script>
</body>
</html>
